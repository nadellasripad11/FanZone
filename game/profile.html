<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <meta name="theme-color" content="#0d0d0d"/>
  <title>FanZone — Profile</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700;900&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="app.css"/>
  <style>
    /* Hero section */
    .profile-hero { margin:16px;background:linear-gradient(160deg,#0d1a0d,#111);border:1px solid var(--border-green);border-radius:var(--radius);padding:20px; }
    .profile-hero__top { display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:16px; }
    .profile-hero__info { flex:1;margin-left:14px; }
    .profile-hero__name { font-family:var(--font-display);font-size:1.4rem;font-weight:900;text-transform:uppercase;letter-spacing:.04em;line-height:1.1;margin-bottom:4px; }
    .profile-hero__handle { font-size:.78rem;color:var(--text-3);margin-bottom:6px; }
    .profile-hero__badges { display:flex;gap:4px;flex-wrap:wrap; }
    .edit-btn { width:34px;height:34px;border-radius:50%;background:var(--bg-3);border:1px solid var(--border);color:var(--text-3);font-size:.85rem;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0; }

    /* Level + XP */
    .level-row { display:flex;align-items:center;justify-content:space-between;margin-bottom:6px; }
    .level-label { font-size:.72rem;color:var(--text-3);font-weight:700;text-transform:uppercase;letter-spacing:.06em; }
    .level-val { font-family:var(--font-display);font-size:1rem;font-weight:900;color:var(--green); }
    .xp-row { display:flex;align-items:center;justify-content:space-between;margin-bottom:4px;font-size:.72rem;color:var(--text-3); }

    /* Stats grid */
    .stats-grid { display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin:0 16px 16px; }
    .stat-card { background:var(--bg-2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:12px 8px;text-align:center; }
    .stat-card__val { font-family:var(--font-display);font-size:1.4rem;font-weight:900;line-height:1;margin-bottom:3px; }
    .stat-card__label { font-size:.62rem;color:var(--text-3);text-transform:uppercase;letter-spacing:.06em;line-height:1.3; }

    /* Badges section */
    .badges-grid { display:grid;grid-template-columns:repeat(4,1fr);gap:10px;padding:0 16px;margin-bottom:20px; }
    .badge-card { background:var(--bg-2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:12px 8px;text-align:center;cursor:default;transition:border-color .15s; }
    .badge-card.earned { border-color:var(--border-green); }
    .badge-card.locked { opacity:.45;filter:grayscale(.5); }
    .badge-card__icon { font-size:1.6rem;line-height:1;margin-bottom:4px; }
    .badge-card__name { font-size:.6rem;color:var(--text-3);text-transform:uppercase;letter-spacing:.04em;line-height:1.3; }

    /* Activity feed */
    .activity-item { display:flex;align-items:flex-start;gap:10px;padding:12px 0;border-bottom:1px solid var(--border); }
    .activity-item:last-child { border:none; }
    .activity-icon { width:32px;height:32px;border-radius:50%;background:var(--bg-3);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:.9rem;flex-shrink:0; }
    .activity-text { flex:1; }
    .activity-title { font-size:.83rem;font-weight:600;margin-bottom:2px; }
    .activity-sub { font-size:.7rem;color:var(--text-3); }
    .activity-xp { font-family:var(--font-display);font-size:.9rem;font-weight:900;color:var(--green);flex-shrink:0; }

    /* Sign-out */
    .signout-area { margin:0 16px 16px; }
  </style>
</head>
<body>

<div class="page-top">
  <div class="page-top__title">👤 Profile</div>
</div>

<!-- PROFILE HERO -->
<div class="profile-hero">
  <div class="profile-hero__top">
    <div class="avatar avatar--lg avatar--ring" id="avatarEl">😎</div>
    <div class="profile-hero__info">
      <div class="profile-hero__name" id="profileName">FanZone Fan</div>
      <div class="profile-hero__handle" id="profileHandle">@fan · 🏳️</div>
      <div class="profile-hero__badges">
        <span class="badge badge--green">🎬 Live Reactor</span>
      </div>
    </div>
    <div class="edit-btn" onclick="showToast('✏️ Edit profile coming soon!')">✏️</div>
  </div>
</div>

<!-- STATS GRID -->
<div class="stats-grid">
  <div class="stat-card">
    <div class="stat-card__val" style="color:var(--green)" id="statReactions">0</div>
    <div class="stat-card__label">Reactions</div>
  </div>
  <div class="stat-card">
    <div class="stat-card__val" style="color:var(--purple)" id="statViral">0</div>
    <div class="stat-card__label">Viral</div>
  </div>
  <div class="stat-card">
    <div class="stat-card__val" style="color:var(--gold)" id="statClipViews">0</div>
    <div class="stat-card__label">Clip Views</div>
  </div>
  <div class="stat-card">
    <div class="stat-card__val" style="color:var(--blue)" id="statWeekly">0</div>
    <div class="stat-card__label">This Week</div>
  </div>
</div>

<!-- TABS -->
<div style="padding:0 16px 16px">
  <div class="tabs">
    <button class="tab active" onclick="switchProfileTab('clips',this)">Top Clips</button>
    <button class="tab" onclick="switchProfileTab('activity',this)">Activity</button>
  </div>
</div>

<!-- CLIPS TAB -->
<div id="ptab-clips" style="padding:0 16px">
  <div style="color:var(--text-3);font-size:.9rem;text-align:center;padding:20px">🎬 Your clips will appear here<br/>Join live rooms and react to start creating content</div>
</div>

<!-- ACTIVITY TAB -->
<div id="ptab-activity" style="display:none;padding:0 16px">
  <div id="activityEl"></div>
</div>

<div style="height:12px"></div>

<!-- SIGN OUT -->
<div class="signout-area">
  <button class="btn btn--danger btn--full" onclick="signOut()">Sign Out</button>
</div>

<div style="height:16px"></div>

<!-- BOTTOM NAV -->
<nav class="bottom-nav">
  <a href="home.html" class="nav-item" data-page="home"><div class="nav-item__icon">🏠</div><div class="nav-item__label">Home</div></a>
  <a href="play.html" class="nav-item" data-page="play"><div class="nav-item__icon">⚡</div><div class="nav-item__label">React</div></a>
  <a href="profile.html" class="nav-item active" data-page="profile"><div class="nav-item__icon">👤</div><div class="nav-item__label">Profile</div></a>
</nav>

<script src="app.js"></script>
<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js';
import { getAuth, onAuthStateChanged, signOut as fbSignOut } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js';
const app = initializeApp(FB_CONFIG);
const auth = getAuth(app);
window._auth = auth;
window._signOut = () => fbSignOut(auth);
onAuthStateChanged(auth, u => {
  FZ.user = u;
  const profile = FZ.getProfile();

  // Profile card
  if (u) {
    document.getElementById('profileName').textContent = profile?.username || u.displayName || 'FanZone Fan';
    document.getElementById('profileHandle').textContent = '@' + (profile?.username || 'fan').toLowerCase() + ' · ' + (profile?.country || '🏳️');
    if (u.photoURL) {
      document.getElementById('avatarEl').innerHTML = `<img src="${u.photoURL}" style="width:100%;height:100%;border-radius:50%;object-fit:cover">`;
    }
  }

  // Real metrics (placeholder data for now)
  document.getElementById('statReactions').textContent = Math.floor(Math.random() * 500) + 10;
  document.getElementById('statViral').textContent = Math.floor(Math.random() * 5);
  document.getElementById('statClipViews').textContent = Math.floor(Math.random() * 5000) + 100;
  document.getElementById('statWeekly').textContent = Math.floor(Math.random() * 50) + 5;
});
</script>
<script>
const BADGES = [
  { icon:'🥇', name:'First Goal', earned:true },
  { icon:'🔥', name:'Hot Streak', earned:true },
  { icon:'🎯', name:'Sharp Shot', earned:true },
  { icon:'🧠', name:'Tactician', earned:true },
  { icon:'⚡', name:'XP Rush', earned:true },
  { icon:'👑', name:'Clash King', earned:false },
  { icon:'🏆', name:'Champion', earned:false },
  { icon:'🌍', name:'World Tour', earned:false },
  { icon:'💫', name:'Legend', earned:false },
  { icon:'🐐', name:'G.O.A.T.', earned:false },
  { icon:'🚀', name:'Rocket Rise', earned:false },
  { icon:'💎', name:'Diamond', earned:false },
];

const ACTIVITY = [
  { icon:'😍', title:'Reacted to Brazil goal', sub:'2 hours ago' },
  { icon:'⚡', title:'Joined live room with 45K fans', sub:'3 hours ago' },
  { icon:'🎬', title:'Featured in trending clip', sub:'Yesterday', highlight:true },
  { icon:'😂', title:'Shared reaction on Instagram', sub:'Yesterday' },
  { icon:'🔥', title:'Joined live penalty shootout', sub:'2 days ago' },
  { icon:'👀', title:'Got 892 likes on reaction', sub:'2 days ago', highlight:true },
];

function renderActivity() {
  document.getElementById('activityEl').innerHTML = ACTIVITY.map(a=>`
    <div class="activity-item" style="${a.highlight?'border-color:var(--border-green);':''}">
      <div class="activity-icon">${a.icon}</div>
      <div class="activity-text">
        <div class="activity-title">${a.title}</div>
        <div class="activity-sub">${a.sub}</div>
      </div>
    </div>`).join('');
}

function switchProfileTab(tab, btn) {
  ['clips','activity'].forEach(t=>{
    const el = document.getElementById('ptab-'+t);
    if (el) el.style.display = t===tab?'block':'none';
  });
  document.querySelectorAll('.tabs .tab').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  if (tab==='activity') renderActivity();
}

function signOut() {
  if (window._signOut) {
    window._signOut().then(()=>{ location.href='index.html'; }).catch(()=>{ location.href='index.html'; });
  } else {
    location.href = 'index.html';
  }
}

renderActivity();
</script>
</body>
</html>
