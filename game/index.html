<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <meta name="theme-color" content="#0d0d0d"/>
  <title>FanZone — Join</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700;900&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="app.css"/>
  <style>
    body { padding-bottom: 0; display: flex; flex-direction: column; min-height: 100vh; }

    /* ── AUTH SCREEN ── */
    .auth-screen { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 32px 24px; text-align: center; position: relative; overflow: hidden; }
    .auth-screen::before { content:''; position:absolute; top:-40%; left:-20%; width:140%; height:80%; background:radial-gradient(ellipse at 50% 40%, rgba(204,255,0,0.07) 0%, transparent 70%); pointer-events:none; }
    .auth-logo { display:flex; align-items:center; gap:10px; font-family:var(--font-display); font-size:2rem; font-weight:900; margin-bottom:8px; }
    .auth-logo-icon { width:48px; height:48px; background:var(--green); border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:1.4rem; color:#000; }
    .auth-logo span { color:var(--green); }
    .auth-tagline { font-size:.85rem; color:var(--text-3); margin-bottom:40px; }
    .auth-hero { font-family:var(--font-display); font-size:clamp(2.2rem,10vw,3.5rem); font-weight:900; text-transform:uppercase; line-height:1; margin-bottom:8px; }
    .auth-hero span { color:var(--green); }
    .auth-sub { font-size:.9rem; color:var(--text-2); margin-bottom:40px; line-height:1.6; max-width:280px; }
    .auth-actions { display:flex; flex-direction:column; gap:12px; width:100%; max-width:340px; }
    .auth-terms { font-size:.72rem; color:var(--text-3); margin-top:16px; line-height:1.5; max-width:280px; }
    .auth-terms a { color:var(--text-2); }

    /* ── ONBOARDING WRAPPER ── */
    .onboard-wrap { flex:1; display:flex; flex-direction:column; }
    .onboard-header { padding:16px 20px 0; display:flex; align-items:center; gap:12px; }
    .back-btn { width:36px; height:36px; border-radius:50%; background:var(--bg-3); border:1px solid var(--border); display:flex; align-items:center; justify-content:center; font-size:1.1rem; cursor:pointer; flex-shrink:0; }
    .step-dots { display:flex; gap:6px; }
    .step-dot { width:24px; height:4px; border-radius:4px; background:var(--bg-4); transition:all .3s; }
    .step-dot.active { background:var(--green); width:32px; }
    .step-dot.done { background:rgba(204,255,0,0.4); }
    .onboard-body { flex:1; overflow-y:auto; padding:24px 20px; }
    .onboard-title { font-family:var(--font-display); font-size:1.8rem; font-weight:900; text-transform:uppercase; margin-bottom:6px; }
    .onboard-sub { font-size:.85rem; color:var(--text-2); margin-bottom:24px; }
    .onboard-footer { padding:16px 20px; padding-bottom:calc(16px + env(safe-area-inset-bottom)); }

    /* Country grid */
    .country-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:10px; }
    .country-item { background:var(--bg-3); border:2px solid var(--border); border-radius:var(--radius-sm); padding:14px 8px; text-align:center; cursor:pointer; transition:all .18s; }
    .country-item:hover { border-color:var(--border-green); }
    .country-item.selected { border-color:var(--green); background:var(--green-dim); }
    .country-item__flag { font-size:2rem; line-height:1; margin-bottom:6px; }
    .country-item__name { font-size:.7rem; font-weight:700; color:var(--text-2); text-transform:uppercase; letter-spacing:.04em; }
    .country-item.selected .country-item__name { color:var(--green); }

    /* Team grid */
    .team-grid { display:grid; grid-template-columns:repeat(2,1fr); gap:10px; }
    .team-item { background:var(--bg-3); border:2px solid var(--border); border-radius:var(--radius-sm); padding:16px 12px; display:flex; align-items:center; gap:12px; cursor:pointer; transition:all .18s; }
    .team-item:hover { border-color:var(--border-green); }
    .team-item.selected { border-color:var(--green); background:var(--green-dim); }
    .team-item__flag { font-size:1.8rem; line-height:1; }
    .team-item__name { font-size:.82rem; font-weight:700; }
    .team-item.selected .team-item__name { color:var(--green); }

    /* Username step */
    .username-wrap { display:flex; flex-direction:column; gap:16px; }
    .username-preview { background:var(--bg-3); border:1px solid var(--border); border-radius:var(--radius); padding:20px; text-align:center; }
    .username-preview__avatar { font-size:3rem; margin-bottom:8px; }
    .username-preview__name { font-family:var(--font-display); font-size:1.4rem; font-weight:900; color:var(--green); }
    .username-preview__flag { font-size:.85rem; color:var(--text-3); }
    .username-tips { display:flex; flex-direction:column; gap:6px; }
    .username-tip { font-size:.78rem; color:var(--text-3); display:flex; gap:6px; align-items:center; }

    /* Interests */
    .interests-grid { display:flex; flex-wrap:wrap; gap:10px; }
    .interest-item { background:var(--bg-3); border:2px solid var(--border); border-radius:40px; padding:10px 18px; display:flex; align-items:center; gap:8px; cursor:pointer; transition:all .18s; font-size:.85rem; font-weight:600; color:var(--text-2); }
    .interest-item:hover { border-color:var(--border-green); }
    .interest-item.selected { border-color:var(--green); background:var(--green-dim); color:var(--green); }
    .interest-item__icon { font-size:1.1rem; }

    /* All set */
    .allset-wrap { text-align:center; padding:20px 0; }
    .allset-avatar { width:100px; height:100px; border-radius:50%; background:var(--bg-3); border:3px solid var(--green); box-shadow:0 0 0 6px rgba(204,255,0,.12); margin:0 auto 16px; display:flex; align-items:center; justify-content:center; font-size:3rem; overflow:hidden; }
    .allset-avatar img { width:100%; height:100%; object-fit:cover; }
    .allset-name { font-family:var(--font-display); font-size:1.8rem; font-weight:900; color:var(--green); margin-bottom:4px; }
    .allset-flag { font-size:.9rem; color:var(--text-2); margin-bottom:24px; }
    .allset-perks { display:flex; flex-direction:column; gap:10px; text-align:left; margin-bottom:24px; }
    .allset-perk { display:flex; align-items:center; gap:12px; background:var(--bg-3); border-radius:var(--radius-sm); padding:12px 14px; font-size:.85rem; color:var(--text-2); }
    .allset-perk__icon { font-size:1.3rem; }
  </style>
</head>
<body>

<!-- AUTH SCREEN -->
<div id="authScreen" class="auth-screen" style="display:flex">
  <div class="auth-logo"><div class="auth-logo-icon">★</div>FAN<span>ZONE</span></div>
  <div class="auth-tagline">One World. One Stadium.</div>
  <div class="auth-hero">The Ultimate<br/><span>Football Fan</span><br/>Experience</div>
  <p class="auth-sub">Predict. Debate. Play.<br/>Connect with millions of fans around the world.</p>
  <div class="auth-actions">
    <button class="btn--google" onclick="signInWithGoogle()">
      <svg width="18" height="18" viewBox="0 0 18 18"><path fill="#4285F4" d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.717v2.258h2.908c1.702-1.567 2.684-3.874 2.684-6.615z"/><path fill="#34A853" d="M9 18c2.43 0 4.467-.806 5.956-2.184l-2.908-2.258c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 0 0 9 18z"/><path fill="#FBBC05" d="M3.964 10.707A5.41 5.41 0 0 1 3.682 9c0-.593.102-1.17.282-1.707V4.961H.957A8.996 8.996 0 0 0 0 9c0 1.452.348 2.827.957 4.039l3.007-2.332z"/><path fill="#EA4335" d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 0 0 .957 4.961L3.964 6.293C4.672 4.166 6.656 3.58 9 3.58z"/></svg>
      Continue with Google
    </button>
    <button class="btn btn--ghost btn--full" onclick="startEmailFlow()">Sign up with Email</button>
    <button class="btn btn--full" style="background:transparent;color:var(--text-3);font-size:.82rem;padding:8px" onclick="continueAsGuest()">Skip — browse as guest</button>
  </div>
  <p class="auth-terms">By continuing you agree to our <a href="../index.html">Terms</a> & <a href="../index.html">Privacy Policy</a>. No gambling. No real money. Entertainment only.</p>

  <!-- Email form (hidden by default) -->
  <div id="emailFlow" style="display:none;width:100%;max-width:340px;margin-top:16px">
    <div class="auth-error" id="authErr"></div>
    <input class="input" id="emailIn" type="email" placeholder="Email address" style="margin-bottom:10px"/>
    <input class="input" id="passIn" type="password" placeholder="Password (min 6 chars)" style="margin-bottom:10px"/>
    <button class="btn btn--primary btn--full" id="emailBtn" onclick="submitEmail()">Create Account</button>
    <div style="text-align:center;margin-top:10px;font-size:.78rem;color:var(--text-3)">Already have one? <span style="color:var(--text-2);cursor:pointer" onclick="toggleEmailMode()">Sign in</span></div>
    <div style="text-align:center;margin-top:8px;font-size:.78rem;color:var(--text-3);cursor:pointer" onclick="hideEmailFlow()">← Back</div>
  </div>
</div>

<!-- ONBOARDING -->
<div id="onboardWrap" class="onboard-wrap" style="display:none">
  <div class="onboard-header">
    <div class="back-btn" id="backBtn" onclick="prevStep()">←</div>
    <div class="step-dots" id="stepDots"></div>
  </div>
  <div class="onboard-body" id="onboardBody"></div>
  <div class="onboard-footer">
    <button class="btn btn--primary btn--full" id="continueBtn" onclick="nextStep()">Continue</button>
  </div>
</div>

<script src="app.js"></script>
<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js';
import { getAuth, GoogleAuthProvider, signInWithPopup, createUserWithEmailAndPassword, signInWithEmailAndPassword, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js';

const app = initializeApp(FB_CONFIG);
const auth = getAuth(app);
const provider = new GoogleAuthProvider();

window._auth = auth;
window.signInWithGoogle = async () => {
  try { await signInWithPopup(auth, provider); }
  catch(e) { if(e.code !== 'auth/popup-closed-by-user') showToast('Sign-in failed. Try again.'); }
};
window._createEmail = (e,p) => createUserWithEmailAndPassword(auth,e,p);
window._signInEmail = (e,p) => signInWithEmailAndPassword(auth,e,p);

onAuthStateChanged(auth, user => {
  FZ.user = user;
  if (user && FZ.isOnboarded()) {
    // User is already onboarded, go to home
    window.location.href = 'home.html';
  } else if (!user) {
    // User not signed in, show auth screen
    document.getElementById('authScreen').style.display = 'flex';
    document.getElementById('onboardWrap').style.display = 'none';
  }
  // If user is signed in but not onboarded, onboarding will be started by submitEmail()
});
</script>
<script>
// ── STATE ──
let step = 0;
let selections = { country: null, team: null, username: '', interests: [], photo: null };
let isSignUp = true;

const COUNTRIES = [
  {flag:'🇧🇷',name:'Brazil'},{flag:'🇦🇷',name:'Argentina'},{flag:'🇫🇷',name:'France'},
  {flag:'🇩🇪',name:'Germany'},{flag:'🇵🇹',name:'Portugal'},{flag:'🇪🇸',name:'Spain'},
  {flag:'🇬🇧',name:'England'},{flag:'🇺🇸',name:'USA'},{flag:'🇯🇵',name:'Japan'},
  {flag:'🇲🇽',name:'Mexico'},{flag:'🇳🇱',name:'Netherlands'},{flag:'🇺🇾',name:'Uruguay'},
  {flag:'🇨🇴',name:'Colombia'},{flag:'🇨🇷',name:'Costa Rica'},{flag:'🇸🇳',name:'Senegal'},
];

const TEAMS = [
  {flag:'🇧🇷',name:'Brazil'},{flag:'🇦🇷',name:'Argentina'},{flag:'🇫🇷',name:'France'},
  {flag:'🇩🇪',name:'Germany'},{flag:'🇵🇹',name:'Portugal'},{flag:'🇪🇸',name:'Spain'},
  {flag:'🇬🇧',name:'England'},{flag:'🇺🇸',name:'USA'},{flag:'🇯🇵',name:'Japan'},
  {flag:'🇲🇽',name:'Mexico'},{flag:'🇳🇱',name:'Netherlands'},{flag:'🇺🇾',name:'Uruguay'},
];

const INTERESTS = [
  {icon:'🎯',label:'Predictions'},{icon:'⚔️',label:'Debates'},{icon:'😂',label:'Memes'},
  {icon:'🎬',label:'Highlights'},{icon:'🎮',label:'Mini Games'},{icon:'📰',label:'News'},
  {icon:'🏆',label:'Tournaments'},{icon:'💬',label:'Live Chat'},
];

const STEPS = ['country','team','username','interests','allset'];

function startOnboarding() {
  document.getElementById('authScreen').style.display = 'none';
  document.getElementById('onboardWrap').style.display = 'flex';
  step = 0;
  renderStep();
}

function renderDots() {
  document.getElementById('stepDots').innerHTML = STEPS.map((_, i) =>
    `<div class="step-dot ${i===step?'active':i<step?'done':''}"></div>`
  ).join('');
  document.getElementById('backBtn').style.visibility = step === 0 ? 'hidden' : 'visible';
}

function renderStep() {
  renderDots();
  const body = document.getElementById('onboardBody');
  const continueBtn = document.getElementById('continueBtn');
  continueBtn.style.display = 'block';

  if (step === 0) {
    body.innerHTML = `
      <div class="onboard-title">Choose Your Country</div>
      <div class="onboard-sub">Where are you watching from?</div>
      <div class="country-grid" id="countryGrid">
        ${COUNTRIES.map(c => `<div class="country-item${selections.country===c.name?' selected':''}" onclick="selectCountry('${c.name}')">
          <div class="country-item__flag">${c.flag}</div>
          <div class="country-item__name">${c.name}</div>
        </div>`).join('')}
      </div>`;
  } else if (step === 1) {
    body.innerHTML = `
      <div class="onboard-title">Choose Your Favorite Team</div>
      <div class="onboard-sub">Who do you support?</div>
      <div class="team-grid" id="teamGrid">
        ${TEAMS.map(t => `<div class="team-item${selections.team===t.name?' selected':''}" onclick="selectTeam('${t.name}','${t.flag}')">
          <div class="team-item__flag">${t.flag}</div>
          <div class="team-item__name">${t.name}</div>
        </div>`).join('')}
      </div>`;
  } else if (step === 2) {
    body.innerHTML = `
      <div class="onboard-title">Create Your Username</div>
      <div class="onboard-sub">This is how other fans will know you.</div>
      <div class="username-wrap">
        <div class="username-preview">
          <div class="username-preview__avatar">⚽</div>
          <div class="username-preview__name" id="previewName">${selections.username || 'Fanatic_10'}</div>
          <div class="username-preview__flag">${selections.country || '🌍'} · Rookie</div>
        </div>
        <input class="input" id="usernameIn" type="text" placeholder="e.g. Fanatic_10" maxlength="20" value="${selections.username}" oninput="updateUsernamePreview(this.value)"/>
        <div class="username-tips">
          <div class="username-tip">✅ 3–20 characters</div>
          <div class="username-tip">✅ Letters, numbers, underscores only</div>
          <div class="username-tip">✅ No spaces</div>
        </div>
      </div>`;
  } else if (step === 3) {
    body.innerHTML = `
      <div class="onboard-title">Select Interests</div>
      <div class="onboard-sub">Choose what you love. Pick as many as you want.</div>
      <div class="interests-grid" id="interestsGrid">
        ${INTERESTS.map(i => `<div class="interest-item${selections.interests.includes(i.label)?' selected':''}" onclick="toggleInterest('${i.label}')">
          <span class="interest-item__icon">${i.icon}</span>${i.label}
        </div>`).join('')}
      </div>`;
  } else if (step === 4) {
    continueBtn.textContent = '🚀 Start Exploring';
    const name = selections.username || (FZ.user?.displayName?.split(' ')[0]) || 'Fan';
    const flag = COUNTRIES.find(c=>c.name===selections.country)?.flag || '🌍';
    const photo = FZ.user?.photoURL;
    body.innerHTML = `
      <div class="allset-wrap">
        <div style="font-size:2.5rem;margin-bottom:12px">🎉</div>
        <div class="onboard-title" style="margin-bottom:4px">You're All Set!</div>
        <div class="onboard-sub">Let the game begin</div>
        <div class="allset-avatar">${photo?`<img src="${photo}" alt="">`:'⚽'}</div>
        <div class="allset-name">${name}</div>
        <div class="allset-flag">${flag} ${selections.country || 'Global'} · Rookie</div>
        <div class="allset-perks">
          <div class="allset-perk"><span class="allset-perk__icon">🎯</span>Predict matches &amp; earn XP</div>
          <div class="allset-perk"><span class="allset-perk__icon">⚔️</span>Clash in live fan debates</div>
          <div class="allset-perk"><span class="allset-perk__icon">🎮</span>Play penalty shootout &amp; more</div>
          <div class="allset-perk"><span class="allset-perk__icon">🏆</span>Climb the global leaderboard</div>
        </div>
      </div>`;
  }
}

function nextStep() {
  if (step === 0 && !selections.country) { showToast('Pick your country first!'); return; }
  if (step === 1 && !selections.team) { showToast('Choose a team to support!'); return; }
  if (step === 2) {
    const val = document.getElementById('usernameIn')?.value.trim();
    if (!val || val.length < 3) { showToast('Username must be at least 3 characters'); return; }
    selections.username = val;
  }
  if (step === 4) {
    FZ.saveProfile({ country: selections.country, team: selections.team, username: selections.username, interests: selections.interests });
    FZ.addXP(100);

    // Check and apply referral code
    const params = new URLSearchParams(window.location.search);
    const refCode = params.get('ref');
    if (refCode) {
      FZ.applyReferral(refCode);
      // Clear the URL parameter
      window.history.replaceState({}, document.title, 'index.html');
    }

    FZ.markOnboarded();
    window.location.href = 'home.html';
    return;
  }
  step++;
  renderStep();
}

function prevStep() {
  if (step > 0) { step--; renderStep(); }
}

function selectCountry(name) {
  selections.country = name;
  document.querySelectorAll('.country-item').forEach(el => {
    el.classList.toggle('selected', el.querySelector('.country-item__name').textContent === name);
  });
}

function selectTeam(name, flag) {
  selections.team = name;
  document.querySelectorAll('.team-item').forEach(el => {
    el.classList.toggle('selected', el.querySelector('.team-item__name').textContent === name);
  });
}

function updateUsernamePreview(val) {
  const clean = val.replace(/[^a-zA-Z0-9_]/g,'');
  document.getElementById('previewName').textContent = clean || 'Fanatic_10';
}

function toggleInterest(label) {
  const idx = selections.interests.indexOf(label);
  if (idx > -1) selections.interests.splice(idx, 1);
  else selections.interests.push(label);
  document.querySelectorAll('.interest-item').forEach(el => {
    const l = el.textContent.trim();
    el.classList.toggle('selected', selections.interests.some(i => l.includes(i)));
  });
}

// ── AUTH FLOWS ──
window.continueAsGuest = function() {
  FZ.user = null;
  startOnboarding();
};

window.startEmailFlow = function() {
  document.getElementById('emailFlow').style.display = 'block';
  document.querySelector('.auth-actions').style.display = 'none';
};

window.hideEmailFlow = function() {
  document.getElementById('emailFlow').style.display = 'none';
  document.querySelector('.auth-actions').style.display = 'flex';
};

window.toggleEmailMode = function() {
  isSignUp = !isSignUp;
  document.getElementById('emailBtn').textContent = isSignUp ? 'Create Account' : 'Sign In';
};

window.submitEmail = async function() {
  const email = document.getElementById('emailIn').value.trim();
  const pass = document.getElementById('passIn').value;
  const errEl = document.getElementById('authErr');
  if (!email || !pass) { errEl.textContent = 'Enter email and password.'; return; }
  try {
    if (isSignUp) await window._createEmail(email, pass);
    else await window._signInEmail(email, pass);
    // After successful auth, hide email form and start onboarding
    hideEmailFlow();
    startOnboarding();
  } catch(e) {
    const msgs = { 'auth/email-already-in-use':'Email already registered.', 'auth/weak-password':'Password too short.', 'auth/invalid-credential':'Wrong email or password.', 'auth/user-not-found':'No account found.' };
    errEl.textContent = msgs[e.code] || 'Error. Try again.';
  }
};
</script>
</body>
</html>
